name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/pathwayIQ
            git pull origin master
            docker ps -q | xargs -r docker stop
            docker ps -aq | xargs -r docker rm
            docker build -t pathwayiq .
            docker run -d --restart unless-stopped -p 8000:8000 pathwayiq
